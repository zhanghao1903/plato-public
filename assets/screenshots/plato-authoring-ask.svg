<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">Plato authoring ASK sample screenshot</title>
  <desc id="desc">A public-safe sample screenshot showing Plato asking planning questions before generating a task plan.</desc>
  <rect width="1400" height="860" fill="#f6f8fb"/>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="40" y="36" width="1320" height="788" rx="24" fill="#ffffff" stroke="#d8e1ec"/>
    <rect x="40" y="36" width="1320" height="72" rx="24" fill="#fbfaf7"/>
    <text x="76" y="82" font-size="24" font-weight="700" fill="#172033">Plato</text>
    <text x="164" y="82" font-size="14" fill="#697386">Local workspace</text>
    <rect x="1160" y="58" width="142" height="30" rx="15" fill="#e8f1fb" stroke="#b8d1f2"/>
    <text x="1182" y="78" font-size="13" font-weight="700" fill="#2b65a3">Understanding</text>

    <rect x="64" y="128" width="250" height="672" rx="16" fill="#f8fafc" stroke="#e1e8f0"/>
    <text x="92" y="174" font-size="16" font-weight="700" fill="#172033">Session</text>
    <text x="92" y="206" font-size="14" fill="#5f6f86">Plan a product release</text>
    <rect x="92" y="246" width="188" height="38" rx="10" fill="#eef5ff"/>
    <text x="112" y="270" font-size="13" fill="#316aa6">Goal received</text>
    <rect x="92" y="302" width="188" height="38" rx="10" fill="#fff8e8"/>
    <text x="112" y="326" font-size="13" fill="#7a5b08">Needs answers</text>
    <rect x="92" y="358" width="188" height="38" rx="10" fill="#ffffff" stroke="#e1e8f0"/>
    <text x="112" y="382" font-size="13" fill="#697386">Draft not ready</text>

    <rect x="344" y="128" width="668" height="672" rx="18" fill="#ffffff" stroke="#d8e1ec"/>
    <text x="384" y="184" font-size="26" font-weight="700" fill="#172033">Plato needs a few answers before planning</text>
    <text x="384" y="216" font-size="15" fill="#697386">Authoring ASK appears before a TaskTree exists. Answer these together so Plato can create a better plan.</text>

    <rect x="384" y="258" width="588" height="114" rx="14" fill="#f3f8ff" stroke="#b8d1f2"/>
    <text x="416" y="294" font-size="16" font-weight="700" fill="#172033">1. What should the first public pass include?</text>
    <rect x="416" y="318" width="132" height="30" rx="15" fill="#ffffff" stroke="#8bb8ef"/>
    <text x="438" y="338" font-size="13" fill="#316aa6">Docs only</text>
    <rect x="562" y="318" width="150" height="30" rx="15" fill="#ffffff" stroke="#8bb8ef"/>
    <text x="584" y="338" font-size="13" fill="#316aa6">Docs + visuals</text>
    <rect x="726" y="318" width="170" height="30" rx="15" fill="#ffffff" stroke="#8bb8ef"/>
    <text x="748" y="338" font-size="13" fill="#316aa6">Release guidance</text>

    <rect x="384" y="396" width="588" height="114" rx="14" fill="#f3f8ff" stroke="#b8d1f2"/>
    <text x="416" y="432" font-size="16" font-weight="700" fill="#172033">2. Which audience should the plan serve first?</text>
    <rect x="416" y="456" width="126" height="30" rx="15" fill="#ffffff" stroke="#8bb8ef"/>
    <text x="438" y="476" font-size="13" fill="#316aa6">New users</text>
    <rect x="556" y="456" width="150" height="30" rx="15" fill="#ffffff" stroke="#8bb8ef"/>
    <text x="578" y="476" font-size="13" fill="#316aa6">Developers</text>
    <rect x="720" y="456" width="160" height="30" rx="15" fill="#ffffff" stroke="#8bb8ef"/>
    <text x="742" y="476" font-size="13" fill="#316aa6">Reviewers</text>

    <rect x="384" y="534" width="588" height="114" rx="14" fill="#f3f8ff" stroke="#b8d1f2"/>
    <text x="416" y="570" font-size="16" font-weight="700" fill="#172033">3. Is there anything Plato should avoid?</text>
    <rect x="416" y="594" width="370" height="30" rx="15" fill="#ffffff" stroke="#8bb8ef"/>
    <text x="438" y="614" font-size="13" fill="#316aa6">Do not expose private paths or implementation details</text>

    <rect x="384" y="682" width="588" height="64" rx="14" fill="#fbfaf7" stroke="#e1e8f0"/>
    <text x="416" y="722" font-size="15" fill="#172033">Submit all answers</text>
    <text x="812" y="722" font-size="13" fill="#697386">3 required</text>

    <rect x="1040" y="128" width="296" height="672" rx="18" fill="#ffffff" stroke="#d8e1ec"/>
    <text x="1072" y="184" font-size="18" font-weight="700" fill="#172033">Why Plato asks</text>
    <text x="1072" y="224" font-size="14" fill="#5f6f86">The goal is useful, but not</text>
    <text x="1072" y="248" font-size="14" fill="#5f6f86">ready to become tasks yet.</text>
    <text x="1072" y="304" font-size="14" fill="#172033">ASK prevents guessing.</text>
    <text x="1072" y="336" font-size="14" fill="#5f6f86">Your answers become the</text>
    <text x="1072" y="360" font-size="14" fill="#5f6f86">input for a draft TaskTree.</text>
    <rect x="1072" y="420" width="226" height="42" rx="10" fill="#eef5ff"/>
    <text x="1094" y="447" font-size="13" fill="#316aa6">Planning is paused</text>
  </g>
</svg>
