<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">Plato execution ASK sample screenshot</title>
  <desc id="desc">A public-safe sample screenshot showing a running Plato task paused for a task-scoped question in the detail panel.</desc>
  <rect width="1400" height="860" fill="#f6f8fb"/>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="40" y="36" width="1320" height="788" rx="24" fill="#ffffff" stroke="#d8e1ec"/>
    <rect x="40" y="36" width="1320" height="72" rx="24" fill="#fbfaf7"/>
    <text x="76" y="82" font-size="24" font-weight="700" fill="#172033">Plato</text>
    <text x="164" y="82" font-size="14" fill="#697386">Task execution</text>
    <rect x="1146" y="58" width="168" height="30" rx="15" fill="#fff8e8" stroke="#ead28a"/>
    <text x="1168" y="78" font-size="13" font-weight="700" fill="#7a5b08">Waiting for user</text>

    <rect x="64" y="128" width="250" height="672" rx="16" fill="#f8fafc" stroke="#e1e8f0"/>
    <text x="92" y="174" font-size="16" font-weight="700" fill="#172033">TaskTree</text>
    <rect x="92" y="214" width="188" height="44" rx="10" fill="#ecfbf4" stroke="#b8e5ce"/>
    <text x="112" y="242" font-size="13" fill="#34725b">Review docs - done</text>
    <rect x="92" y="278" width="188" height="44" rx="10" fill="#fff8e8" stroke="#ead28a"/>
    <text x="112" y="306" font-size="13" fill="#7a5b08">Update guide - waiting</text>
    <rect x="92" y="342" width="188" height="44" rx="10" fill="#ffffff" stroke="#e1e8f0"/>
    <text x="112" y="370" font-size="13" fill="#697386">Publish PR - queued</text>

    <rect x="344" y="128" width="584" height="672" rx="18" fill="#ffffff" stroke="#d8e1ec"/>
    <text x="384" y="184" font-size="24" font-weight="700" fill="#172033">Visible execution context stays on screen</text>
    <text x="384" y="216" font-size="15" fill="#697386">Execution ASK does not replace the main work area. The task plan remains visible while one task waits.</text>
    <rect x="384" y="270" width="504" height="92" rx="14" fill="#ecfbf4" stroke="#b8e5ce"/>
    <text x="416" y="306" font-size="16" font-weight="700" fill="#172033">Completed</text>
    <text x="416" y="334" font-size="14" fill="#466b5b">Review existing public product docs.</text>
    <rect x="384" y="386" width="504" height="112" rx="14" fill="#fff8e8" stroke="#ead28a"/>
    <text x="416" y="422" font-size="16" font-weight="700" fill="#172033">Waiting for user input</text>
    <text x="416" y="450" font-size="14" fill="#62522a">Update the user guide with ASK behavior.</text>
    <text x="416" y="478" font-size="14" fill="#62522a">The task is paused until the question is answered.</text>
    <rect x="384" y="522" width="504" height="92" rx="14" fill="#ffffff" stroke="#e1e8f0"/>
    <text x="416" y="558" font-size="16" font-weight="700" fill="#172033">Queued</text>
    <text x="416" y="586" font-size="14" fill="#697386">Prepare final public PR notes.</text>

    <rect x="956" y="128" width="380" height="672" rx="18" fill="#ffffff" stroke="#d8e1ec"/>
    <text x="996" y="184" font-size="21" font-weight="700" fill="#172033">Task question</text>
    <rect x="996" y="210" width="126" height="30" rx="15" fill="#fff8e8" stroke="#ead28a"/>
    <text x="1018" y="230" font-size="13" font-weight="700" fill="#7a5b08">Blocking ASK</text>
    <text x="996" y="284" font-size="16" font-weight="700" fill="#172033">Which answer style should Plato use?</text>
    <text x="996" y="318" font-size="14" fill="#697386">The running task needs this choice before it can continue safely.</text>
    <rect x="996" y="358" width="292" height="46" rx="12" fill="#eef5ff" stroke="#8bb8ef"/>
    <text x="1020" y="387" font-size="14" fill="#316aa6">Short user-facing guide</text>
    <rect x="996" y="420" width="292" height="46" rx="12" fill="#ffffff" stroke="#d8e1ec"/>
    <text x="1020" y="449" font-size="14" fill="#5f6f86">Detailed technical note</text>
    <rect x="996" y="482" width="292" height="46" rx="12" fill="#ffffff" stroke="#d8e1ec"/>
    <text x="1020" y="511" font-size="14" fill="#5f6f86">Not sure yet</text>
    <rect x="996" y="564" width="292" height="72" rx="12" fill="#fbfaf7" stroke="#e1e8f0"/>
    <text x="1020" y="592" font-size="13" fill="#697386">Optional note</text>
    <text x="1020" y="616" font-size="14" fill="#172033">Keep it practical and concise.</text>
    <rect x="996" y="674" width="136" height="42" rx="12" fill="#2f6fd6"/>
    <text x="1032" y="701" font-size="14" font-weight="700" fill="#ffffff">Answer</text>
    <rect x="1146" y="674" width="88" height="42" rx="12" fill="#ffffff" stroke="#d8e1ec"/>
    <text x="1174" y="701" font-size="14" fill="#5f6f86">Defer</text>
    <rect x="1248" y="674" width="70" height="42" rx="12" fill="#ffffff" stroke="#d8e1ec"/>
    <text x="1266" y="701" font-size="14" fill="#5f6f86">Cancel</text>
  </g>
</svg>
