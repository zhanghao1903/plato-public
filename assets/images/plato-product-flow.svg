<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Plato product flow</title>
  <desc id="desc">A diagram showing user intent flowing through TaskTree review, confirmation, execution, result, and audit.</desc>
  <rect width="1200" height="420" fill="#ffffff"/>
  <text x="64" y="58" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#182033">Task-first product flow</text>
  <text x="64" y="88" font-family="Inter, Arial, sans-serif" font-size="15" fill="#697386">Plato keeps work visible before, during, and after execution.</text>
  <g font-family="Inter, Arial, sans-serif" transform="translate(64 140)">
    <g>
      <rect x="0" y="0" width="158" height="120" rx="12" fill="#fbfaf7" stroke="#dce3ee"/>
      <text x="24" y="38" font-size="18" font-weight="700" fill="#182033">Intent</text>
      <text x="24" y="68" font-size="13" fill="#697386">Natural language</text>
      <text x="24" y="90" font-size="13" fill="#697386">goal from user</text>
    </g>
    <path d="M176 60h54" stroke="#5b8fd9" stroke-width="3"/>
    <path d="M230 60l-12-8v16z" fill="#5b8fd9"/>
    <g transform="translate(248 0)">
      <rect x="0" y="0" width="158" height="120" rx="12" fill="#e8f1fb" stroke="#b8d1f2"/>
      <text x="24" y="38" font-size="18" font-weight="700" fill="#182033">TaskTree</text>
      <text x="24" y="68" font-size="13" fill="#697386">Structured plan</text>
      <text x="24" y="90" font-size="13" fill="#697386">before execution</text>
    </g>
    <path d="M424 60h54" stroke="#5b8fd9" stroke-width="3"/>
    <path d="M478 60l-12-8v16z" fill="#5b8fd9"/>
    <g transform="translate(496 0)">
      <rect x="0" y="0" width="158" height="120" rx="12" fill="#fff7df" stroke="#ead28a"/>
      <text x="24" y="38" font-size="18" font-weight="700" fill="#182033">Review</text>
      <text x="24" y="68" font-size="13" fill="#697386">Adjust tasks</text>
      <text x="24" y="90" font-size="13" fill="#697386">confirm risk</text>
    </g>
    <path d="M672 60h54" stroke="#5b8fd9" stroke-width="3"/>
    <path d="M726 60l-12-8v16z" fill="#5b8fd9"/>
    <g transform="translate(744 0)">
      <rect x="0" y="0" width="158" height="120" rx="12" fill="#ecfbf4" stroke="#b8e5ce"/>
      <text x="24" y="38" font-size="18" font-weight="700" fill="#182033">Execute</text>
      <text x="24" y="68" font-size="13" fill="#697386">Local runtime</text>
      <text x="24" y="90" font-size="13" fill="#697386">runs tasks</text>
    </g>
    <path d="M920 60h54" stroke="#5b8fd9" stroke-width="3"/>
    <path d="M974 60l-12-8v16z" fill="#5b8fd9"/>
    <g transform="translate(992 0)">
      <rect x="0" y="0" width="158" height="120" rx="12" fill="#f6f3ff" stroke="#d7c9f4"/>
      <text x="24" y="38" font-size="18" font-weight="700" fill="#182033">Outcome</text>
      <text x="24" y="68" font-size="13" fill="#697386">Result, files,</text>
      <text x="24" y="90" font-size="13" fill="#697386">and audit</text>
    </g>
  </g>
  <rect x="64" y="318" width="1072" height="52" rx="12" fill="#fbfaf7" stroke="#dce3ee"/>
  <text x="88" y="350" font-family="Inter, Arial, sans-serif" font-size="15" fill="#182033">Design rule: consequential work should be drafted and reviewed before execution.</text>
</svg>
