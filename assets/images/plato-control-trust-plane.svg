<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Main Page control plane and Audit Page trust plane</title>
  <desc id="desc">A diagram comparing the Main Page as a control plane and Audit Page as a trust plane.</desc>
  <rect width="1200" height="430" fill="#fbfaf7"/>
  <text x="64" y="58" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#182033">Control plane and trust plane</text>
  <text x="64" y="88" font-family="Inter, Arial, sans-serif" font-size="15" fill="#697386">Plato separates action-oriented work from evidence-oriented review.</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="92" y="138" width="470" height="210" rx="18" fill="#ffffff" stroke="#dce3ee"/>
    <text x="132" y="184" font-size="24" font-weight="700" fill="#182033">Main Page</text>
    <text x="132" y="214" font-size="15" fill="#697386">Control plane</text>
    <text x="132" y="256" font-size="15" fill="#182033">Tasks, status, confirmations, results</text>
    <text x="132" y="286" font-size="15" fill="#182033">What can I do next?</text>
    <rect x="638" y="138" width="470" height="210" rx="18" fill="#ffffff" stroke="#dce3ee"/>
    <text x="678" y="184" font-size="24" font-weight="700" fill="#182033">Audit Page</text>
    <text x="678" y="214" font-size="15" fill="#697386">Trust plane</text>
    <text x="678" y="256" font-size="15" fill="#182033">Evidence, traceability, diagnostics</text>
    <text x="678" y="286" font-size="15" fill="#182033">What happened and why?</text>
  </g>
  <path d="M578 243h44" stroke="#5b8fd9" stroke-width="3"/>
  <path d="M622 243l-12-8v16z" fill="#5b8fd9"/>
</svg>
