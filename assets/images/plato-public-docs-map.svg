<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Plato public documentation map</title>
  <desc id="desc">A diagram mapping public README, product docs, architecture docs, usage docs, release metadata, and image assets.</desc>
  <rect width="1200" height="430" fill="#fbfaf7"/>
  <text x="64" y="58" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#182033">Public repository map</text>
  <text x="64" y="88" font-family="Inter, Arial, sans-serif" font-size="15" fill="#697386">How this repository is organized for visitors.</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="92" y="154" width="180" height="76" rx="14" fill="#2b5caa"/>
    <text x="133" y="199" font-size="20" font-weight="700" fill="#ffffff">README</text>
    <rect x="368" y="118" width="210" height="76" rx="14" fill="#ffffff" stroke="#dce3ee"/>
    <text x="414" y="163" font-size="18" font-weight="700" fill="#182033">Product docs</text>
    <rect x="368" y="226" width="210" height="76" rx="14" fill="#ffffff" stroke="#dce3ee"/>
