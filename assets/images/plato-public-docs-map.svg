    <rect x="674" y="118" width="210" height="76" rx="14" fill="#ffffff" stroke="#dce3ee"/>
    <text x="732" y="163" font-size="18" font-weight="700" fill="#182033">Usage docs</text>
    <rect x="674" y="226" width="210" height="76" rx="14" fill="#ffffff" stroke="#dce3ee"/>
    <text x="724" y="271" font-size="18" font-weight="700" fill="#182033">Images</text>
    <rect x="980" y="172" width="150" height="76" rx="14" fill="#ffffff" stroke="#dce3ee"/>
    <text x="1016" y="217" font-size="18" font-weight="700" fill="#182033">Release</text>
  </g>
