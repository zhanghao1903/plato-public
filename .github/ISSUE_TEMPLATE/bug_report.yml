name: Bug report
description: Report a reproducible Plato product or release issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing Plato. Do not attach private logs, secrets, or real workspace files unless you have sanitized them.
  - type: input
    id: version
    attributes:
      label: Plato version
      description: "Example: 0.1.0"
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, and whether you used the DMG release.
      placeholder: "macOS 15, Apple Silicon, DMG release"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest sequence that triggers the issue.
      placeholder: |
        1. Open Plato
        2. Create a session
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or sanitized logs
      description: Optional. Please remove private data first.
    validations:
      required: false
